<!DOCTYPE html>
<html>
<head>
  <title>Controle de Frota</title>
  <style>
    /* Estilos base mantidos */
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif;}
    body { background:#f0f2f5; color:#333; text-align:center; padding:20px;}
    h2 { color:#2c3e50; margin-bottom:30px; font-size:2rem; }
    #container { max-width:500px; margin:auto; background:white; padding:25px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    input { width:100%; padding:12px 15px; margin:10px 0; border:1px solid #ccc; border-radius:10px; font-size:1rem; transition:.3s; }
    button { padding:10px 20px; margin:5px; font-size:1rem; border:none; border-radius:10px; cursor:pointer; transition:.3s; }
    .btn-login { background:#3498db; color:white; }
    .btn-register { background:#2ecc71; color:white; }
    .btn-logout { background: #e67e22; color: white; padding: 8px 15px; font-size: 0.8rem; border-radius: 8px; }
    #userDiv { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 10px; }
    .carro-card { border:1px solid #ddd; margin:10px 0; padding:20px; border-radius:15px; box-shadow:0 3px 10px rgba(0,0,0,0.08); text-align:left; position:relative; }
    .carro-card b { font-size: 1.2rem; color: #2c3e50; display: block; margin-bottom: 10px; }
    .carro-status { font-weight:bold; padding:5px 10px; border-radius:5px; color:white; }
    .status-disponivel { background: #27ae60; }
    .status-emuso { background: #e74c3c; }
    .carro-card button { margin-top:10px; width:100%; font-weight:bold; border-radius:8px; padding:8px; }
    #mensagem { position:fixed; top:10px; left:50%; transform:translateX(-50%); background:#2ecc71; color:white; padding:10px 20px; border-radius:10px; display:none; z-index:3000;}
    .password-container { position: relative; width: 100%; }
    .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #7f8c8d; }

    /* --- CSS DA AGENDA ESTILO TEAMS --- */
    #modalAgenda { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); overflow-y: auto; }
    .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 15px; width: 95%; max-width: 600px; position: relative; }
    .close-modal { position: absolute; right: 20px; top: 15px; font-size: 1.5rem; cursor: pointer; color: #7f8c8d; }
    
    .grade-semanal { display: grid; grid-template-columns: 50px repeat(5, 1fr); gap: 5px; margin-top: 20px; font-size: 0.7rem; overflow-x: auto; }
    .col-hora { background: #f8f9fa; font-weight: bold; display: flex; align-items: center; justify-content: center; border-radius: 5px; border: 1px solid #eee;}
    .dia-cabecalho { font-weight: bold; text-align: center; padding: 10px 0; background: #34495e; color: white; border-radius: 5px; }
    
    .slot-agenda { height: 50px; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; transition: 0.2s; position: relative; text-align: center;}
    .slot-disponivel:hover { background: #e1f5fe; border-color: #3498db; }
    .slot-ocupado { background: #ffebee; border-color: #ffcdd2; color: #c62828; cursor: not-allowed; }
    .slot-meu { background: #e8f5e9; border-color: #c8e6c9; color: #2e7d32; }
    .slot-ocupado small { font-size: 0.55rem; font-weight: bold; }
    .btn-cancela-slot { position: absolute; top: 0; right: 0; background: #e74c3c; color: white; border: none; font-size: 0.6rem; padding: 2px 5px; border-radius: 0 0 0 5px; cursor: pointer; }
    /* Ajuste de toque para botões */
    button, .slot-agenda, .close-modal {
        min-height: 44px; /* Tamanho mínimo recomendado pela Apple/Google */
        touch-action: manipulation;
    }

    #container {
        width: 95%;
        max-width: 500px;
        padding: 15px;
        margin: 10px auto;
    }

    /* Agenda Semanal no Mobile */
    .grade-semanal {
        display: grid;
        grid-template-columns: 45px repeat(5, 1fr); /* Diminuído para caber */
        gap: 3px;
        overflow-x: auto; /* Permite scroll lateral se a tela for muito pequena */
        -webkit-overflow-scrolling: touch;
    }

    .slot-agenda {
        height: 60px; /* Aumentado para facilitar o clique */
        font-size: 0.6rem;
    }

    /* Esconder scrollbar da grade para ficar mais limpo */
    .grade-semanal::-webkit-scrollbar {
        display: none;
    }

    /* Card do Carro mais compacto */
    .carro-card {
        padding: 15px;
        margin-bottom: 15px;
    }

    .carro-card button {
        font-size: 1.1rem; /* Botão principal maior */
        padding: 12px;
    }

    button:active, .slot-agenda:active {
      transform: scale(0.98);
      opacity: 0.8;
    }

    /* Estilo para a Logo */
    .app-logo {
        /* Dimensões ideais */
        width: 100%;       /* Ocupa a largura do container em telas pequenas */
        max-width: 200px;  /* Largura máxima no PC (evita que fique gigante) */
        height: auto;      /* Mantém a proporção da imagem (não achata) */
        
        /* Centralização e Espaçamento */
        display: block;    /* Garante que margens funcionem */
        margin: 0 auto 20px auto; /* Centraliza horizontalmente e dá espaço abaixo */
        
        /* Mobile-friendly */
        -webkit-user-drag: none; /* Impede que o usuário "arraste" a imagem no celular */
    }

    h2{
      color: rgb(0, 0, 124);
    }

    .status-agendado { 
      background: #f1c40f; 
      color: #000 !important; 
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <h2>Controle de Frota</h2>
  <div id="mensagem"></div>

  <div id="container">

    <img src="logo.png" alt="Logo Empresa" class="app-logo">

    <div id="authDiv">
      <div style="display: flex; margin-bottom: 20px;">
        <button onclick="alternarAuth('login')" id="tabLogin" style="flex:1; background:#3498db; color:white;">Login</button>
        <button onclick="alternarAuth('registro')" id="tabRegistro" style="flex:1; background:#ecf0f1; color:#333;">Novo Cadastro</button>
      </div>
      <div id="formLogin">
        <input type="email" id="emailLogin" placeholder="E-mail">
        <div class="password-container">
          <input type="password" id="senhaLogin" placeholder="Senha">
          <i class="fas fa-eye toggle-password" onclick="toggleSenha('senhaLogin')"></i>
        </div>
        <button class="btn-login" onclick="login()" style="width:100%">Entrar no Sistema</button>
      </div>
      <div id="formRegistro" style="display: none;">
        <input type="text" id="nomeRegistro" placeholder="Seu Nome Completo">
        <input type="email" id="emailRegistro" placeholder="E-mail Corporativo">
        <div class="password-container">
          <input type="password" id="senhaRegistro" placeholder="Senha">
          <i class="fas fa-eye toggle-password" onclick="toggleSenha('senhaRegistro')"></i>
        </div>
        <button class="btn-register" onclick="registrar()" style="width:100%">Criar Minha Conta</button>
      </div>
    </div>

    <div id="conteudoPrivado" style="display: none;">
      <div id="userDiv">
        <div id="userInfo" style="font-size: 0.8rem; font-weight: bold;"></div>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
      <div id="adminDiv" style="background: #ecf0f1; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; display: none;">
        <h4 style="margin-bottom: 5px;">➕ Cadastrar Veículo</h4>
        <div style="display: flex; gap: 5px;">
          <input type="text" id="novoCarroNome" placeholder="Ex: Strada - ABC1234" style="margin:0;">
          <button class="btn-register" onclick="cadastrarCarro()" style="margin:0;">Adicionar</button>
        </div>
      </div>
      <div id="lista"></div>
      
      <div id="historicoSecao" style="margin-top: 20px;">
        <button onclick="toggleHistorico()" style="background: #95a5a6; color: white; width: 100%; display: flex; justify-content: space-between;">
          📜 Histórico <span id="setaHistorico">▼</span>
        </button>
        <div id="conteudoHistorico" style="display: none; padding-top:10px;">
          <div id="tabelaHistorico"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalAgenda">
    <div class="modal-content">
      <span class="close-modal" onclick="fecharModal()">&times;</span>
      <h3 id="tituloModal">Agenda</h3>
      <p style="font-size: 0.7rem; color: #666; margin-bottom: 10px;">Clique nos slots para reservar ou cancelar seus horários.</p>
      <div class="grade-semanal" id="gradeHorarios"></div>
    </div>
  </div>

  <script type="module">
    // 1. Registro imediato do Service Worker (Essencial para o botão "Instalar")
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log("PWA: Service Worker Ativo", reg.scope))
      .catch(err => console.log("PWA: Erro no registro", err));
      });
    }
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, addDoc, query, where, getDocs, orderBy, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADjANdIwDnh6y4kgWN6oLXeJv4Z00oT-M",
      authDomain: "frota-empresa.firebaseapp.com",
      projectId: "frota-empresa",
      storageBucket: "frota-empresa.firebasestorage.app",
      messagingSenderId: "241729095537",
      appId: "1:241729095537:web:fcfb1e2a5fe7c3fca098d0"
    };

    const emailsAdmins = ["ti@ghpc.com.br"];
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let usuarioLogado = null;
    let nomeUsuarioLogado = null;
    let carroIdAtual = null;
    const DIAS = ["SEG", "TER", "QUA", "QUI", "SEX"];
    const HORAS = ["08:00", "09:00", "10:00", "11:00", "12:00","13:00", "14:00", "15:00", "16:00", "17:00",  "18:00"];

    const mostrarMensagem = (texto, cor="#2ecc71", tempo = 2500) => {
      const msg = document.getElementById("mensagem");
      msg.style.background = cor; msg.innerText = texto; msg.style.display = "block";
      setTimeout(()=> msg.style.display="none", tempo);
    };

     const verificarSeEstaAgendadoAgora = (agenda) => {
        if (!agenda) return false;

        const agora = new Date();
        const diaSemana = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"][agora.getDay()];
        
        // Formata a hora para o padrão do seu sistema (ex: "09:00")
        const horaFormatada = agora.getHours().toString().padStart(2, '0') + ":00";
        
        const idSlotAtual = `${diaSemana}-${horaFormatada}`;
        
        // Retorna true se houver alguém ocupando esse slot
        return !!agenda[idSlotAtual];
      };

    function renderizar(snapshot) {
      const lista = document.getElementById("lista");
      lista.innerHTML = ""; // Limpa a lista antes de reconstruir

      snapshot.forEach((docSnap) => {
        const carro = docSnap.data();
        const isAdmin = usuarioLogado && emailsAdmins.includes(usuarioLogado);
        
        // Verifica agendamento para o horário atual
        const estaAgendadoAgora = verificarSeEstaAgendadoAgora(carro.agendaGrade);
        
        // Definição de Status e Cores
        let statusClass = carro.status === "disponivel" ? "status-disponivel" : "status-emuso";
        let estiloCard = "";
        let textoStatus = carro.status === "disponivel" ? "Disponível" : "Em uso";

        // Regra do Amarelo: Se disponível, mas com reserva agora
        if (carro.status === "disponivel" && estaAgendadoAgora) {
          statusClass = "status-agendado";
          estiloCard = "border: 2px solid #f1c40f; background: #fffdf0;";
          textoStatus = "Reservado Agora";
        }

        // Lógica do Botão de Ação
        let acaoBotao = "";
        if (carro.status === "disponivel" && usuarioLogado) {
          // Mesmo agendado, o botão "Pegar" aparece, mas o card fica amarelo para avisar
          acaoBotao = `<button style="background:#27ae60;color:white;" onclick="pegarCarro('${docSnap.id}')">Pegar</button>`;
        } else if (carro.status === "em_uso") {
          if (carro.usuario === usuarioLogado || isAdmin) {
            const corB = isAdmin && carro.usuario !== usuarioLogado ? "#e67e22" : "#e74c3c";
            acaoBotao = `<button style="background:${corB};color:white;" onclick="devolverCarro('${docSnap.id}')">Devolver ${isAdmin && carro.usuario !== usuarioLogado ? '(Admin)' : ''}</button>`;
          } else {
            acaoBotao = `<button disabled style="background:gray;color:white;">Em uso</button>`;
          }
        }

        // Template HTML Único
        lista.innerHTML += `
          <div class="carro-card" style="${estiloCard}">
            <b>${carro.nome}</b>
            <span class="carro-status ${statusClass}">${textoStatus}</span>
            
            <div style="font-size: 0.8rem; margin: 10px 0; color: #555;">
              📍 KM: ${carro.ultimoKM || "---"} | 🏢 Local: ${carro.localDevolucao || "---"}<br>
              📝 Obs: ${carro.observacao || "Nenhuma"}
            </div>

            <div style="display:flex; gap:5px;">
              <button style="background:#95a5a6; color:white; font-size:0.7rem;" onclick="editarObs('${docSnap.id}')">Obs</button>
              <button style="background:#34495e; color:white; font-size:0.7rem;" onclick="abrirAgenda('${docSnap.id}', '${carro.nome}')">📅 Agenda Semanal</button>
            </div>

            ${acaoBotao}

            ${carro.usuario ? `<small style="color:#888;">👤 Com: ${carro.usuarioNome || carro.usuario}</small>` : ""}
            
            <div style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
              ${isAdmin ? `<button style="background:#c0392b; color:white; font-size:0.6rem; width: auto;" onclick="excluirCarro('${docSnap.id}', '${carro.nome}')">Excluir</button>` : ""}
              ${isAdmin ? `<button style="background:#8e44ad; color:white; font-size:0.6rem; width: auto;" onclick="resetarAgendaCarro('${docSnap.id}', '${carro.nome}')">Resetar Agenda</button>` : ""}
            </div>
          </div>`;
      });
    }
    // --- LOGICA DA AGENDA ---
    window.fecharModal = () => document.getElementById("modalAgenda").style.display = "none";

    window.abrirAgenda = async (id, nome) => {
      carroIdAtual = id;
      document.getElementById("tituloModal").innerText = "Agenda: " + nome;
      document.getElementById("modalAgenda").style.display = "block";
      const snap = await getDoc(doc(db, "carros", id));
      desenharGrade(snap.data().agendaGrade || {});
    };

    function desenharGrade(agenda) {
      const grade = document.getElementById("gradeHorarios");
      grade.innerHTML = "<div></div>"; 
      DIAS.forEach(dia => grade.innerHTML += `<div class="dia-cabecalho">${dia}</div>`);
      HORAS.forEach(hora => {
        grade.innerHTML += `<div class="col-hora">${hora}</div>`;
        DIAS.forEach(dia => {
          const idSlot = `${dia}-${hora}`;
          const res = agenda[idSlot];
          const isAdmin = emailsAdmins.includes(usuarioLogado);
          let classe = "slot-disponivel";
          let cont = "";
          let click = `onclick="reservarSlot('${idSlot}')"`;

          if (res) {
            const souDono = res.email === usuarioLogado;
            classe = souDono ? "slot-meu" : "slot-ocupado";
            cont = `<small>${res.nome.split(' ')[0]}</small>`;
            if (souDono || isAdmin) {
              click = `onclick="cancelarSlot('${idSlot}')"`;
              cont += `<button class="btn-cancela-slot">X</button>`;
            } else {
              click = `onclick="mostrarMensagem('Ocupado por ${res.nome}', '#e67e22')"`;
            }
          }
          grade.innerHTML += `<div class="slot-agenda ${classe}" ${click}>${cont}</div>`;
        });
      });
    }

    window.reservarSlot = async (idSlot) => {
      try {
        const user = auth.currentUser; // Pega o usuário logado no momento exato
        const nomeParaGravar = user.displayName || user.email;

        const ref = doc(db, "carros", carroIdAtual);
        const snap = await getDoc(ref);
        const agenda = snap.data().agendaGrade || {};

        agenda[idSlot] = { 
          nome: nomeParaGravar, 
          email: user.email, 
          data: new Date() 
        };

        await updateDoc(ref, { agendaGrade: agenda });
        desenharGrade(agenda);
        mostrarMensagem("Reservado para " + nomeParaGravar);
      } catch (err) { 
        console.error(err);
        mostrarMensagem("Erro ao reservar", "#e74c3c");
      }
    };

    window.cancelarSlot = async (idSlot) => {
      if(!confirm("Cancelar reserva?")) return;
      const ref = doc(db, "carros", carroIdAtual);
      const snap = await getDoc(ref);
      const agenda = snap.data().agendaGrade || {};
      delete agenda[idSlot];
      await updateDoc(ref, { agendaGrade: agenda });
      desenharGrade(agenda);
      mostrarMensagem("Cancelado!");
    };

    // --- FUNÇÕES DE CARRO ---
    window.pegarCarro = async (id) => {
      try {
        const user = auth.currentUser;
        const nomeParaGravar = user.displayName || user.email;

        // 1. Trava de segurança: Verifica se o motorista já está com algum carro
        const q = query(collection(db, "carros"), where("usuario", "==", user.email));
        const qSnap = await getDocs(q);
        if (!qSnap.empty) return mostrarMensagem("Você já tem um veículo em uso!", "#e74c3c");

        const ref = doc(db, "carros", id);
        const snap = await getDoc(ref);
        const dadosCarro = snap.data();

        // --- NOVA LÓGICA DE VALIDAÇÃO DE AGENDA ---
        const agora = new Date();
        const diaSemana = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"][agora.getDay()];
        const horaFormatada = agora.getHours().toString().padStart(2, '0') + ":00";
        const idSlotAtual = `${diaSemana}-${horaFormatada}`;

        const reservaAtual = dadosCarro.agendaGrade ? dadosCarro.agendaGrade[idSlotAtual] : null;

        // Se houver reserva e NÃO for do usuário logado (validação por e-mail)
        if (reservaAtual && reservaAtual.email !== user.email) {
          const confirmarFuro = confirm(
            `⚠️ ATENÇÃO!\n\nEste veículo está reservado para: ${reservaAtual.nome}.\n\nDeseja ignorar a reserva e retirar o carro mesmo assim?`
          );
          if (!confirmarFuro) return; // Cancela a operação se o usuário desistir
        }
        // ------------------------------------------

        const kmSaida = dadosCarro.ultimoKM || "0";

        // 2. Atualiza o status do carro
        await updateDoc(ref, { 
          status: "em_uso", 
          usuario: user.email, 
          usuarioNome: nomeParaGravar, 
          updatedAt: new Date() 
        });

        // 3. Registra no histórico com o KM de Saída
        await addDoc(collection(db, "historico"), { 
          carroId: id, 
          carroNome: dadosCarro.nome, 
          usuario: user.email,
          usuarioNome: nomeParaGravar,
          acao: "pegou", 
          kmSaida: kmSaida,
          data: new Date() 
        });

        mostrarMensagem(`Retirado! Saída: KM ${kmSaida}`);
      } catch (err) { 
        console.error(err);
        mostrarMensagem("Erro ao retirar veículo", "#e74c3c"); 
      }
    };

    window.devolverCarro = async (id) => {
      const user = auth.currentUser;
      const ref = doc(db, "carros", id);
      const snap = await getDoc(ref);
      const carro = snap.data();
      
      const kmAnterior = parseFloat(carro.ultimoKM) || 0;
      const novoKM = prompt(`KM de Saída: ${kmAnterior}. Digite o KM atual de Chegada:`);
      
      if (!novoKM || isNaN(novoKM) || parseFloat(novoKM) <= kmAnterior) {
        return mostrarMensagem("Erro: KM atual deve ser maior que o anterior!", "#e74c3c", 4000);
      }

      const local = prompt("Local (GHPC, G-MOTION ou KPT):")?.toUpperCase();
      if (!["GHPC", "G-MOTION", "KPT"].includes(local)) {
        return mostrarMensagem("Local inválido!", "#e74c3c");
      }

      try {
        const kmChegada = parseFloat(novoKM);
        const totalViagem = kmChegada - kmAnterior;

        // 1. Libera o carro para o próximo
        await updateDoc(ref, { 
          status: "disponivel", 
          usuario: "", 
          usuarioNome: "", 
          ultimoKM: kmChegada, 
          localDevolucao: local, 
          updatedAt: new Date() 
        });

        // 2. Grava o histórico detalhado
        await addDoc(collection(db, "historico"), { 
          carroId: id, 
          carroNome: carro.nome, 
          usuario: user.email,
          usuarioNome: user.displayName || user.email,
          acao: "devolveu", 
          kmSaida: kmAnterior,
          kmChegada: kmChegada,
          totalRodado: totalViagem,
          local: local, 
          data: new Date() 
        });

        mostrarMensagem(`Sucesso! Você rodou ${totalViagem}km.`);
      } catch (err) { 
        console.error(err);
        mostrarMensagem("Erro ao devolver", "#e74c3c"); 
      }
    };

    // --- AUTH E BOILERPLATE ---
    window.login = async () => {
      try { await signInWithEmailAndPassword(auth, document.getElementById("emailLogin").value, document.getElementById("senhaLogin").value); } 
      catch (e) { mostrarMensagem("Erro no login", "#e74c3c"); }
    };

    window.registrar = async () => {
      const nome = document.getElementById("nomeRegistro").value;
      const email = document.getElementById("emailRegistro").value;
      const senha = document.getElementById("senhaRegistro").value;
      if(!nome || !email || !senha) return mostrarMensagem("Preencha tudo", "#e74c3c");
      try {
        const res = await createUserWithEmailAndPassword(auth, email, senha);
        await updateProfile(res.user, { displayName: nome });
        mostrarMensagem("Conta criada!");
      } catch (e) { mostrarMensagem("Erro ao criar conta", "#e74c3c"); }
    };

    window.logout = () => signOut(auth);
    window.toggleSenha = (id) => { const el = document.getElementById(id); el.type = el.type === "password" ? "text" : "password"; };
    window.alternarAuth = (t) => {
      const isL = t === 'login';
      document.getElementById("formLogin").style.display = isL ? "block" : "none";
      document.getElementById("formRegistro").style.display = isL ? "none" : "block";
      document.getElementById("tabLogin").style.background = isL ? "#3498db" : "#ecf0f1";
      document.getElementById("tabRegistro").style.background = isL ? "#ecf0f1" : "#2ecc71";
    };
    window.editarObs = async (id) => {
      const obs = prompt("Observação:");
      if(obs !== null) await updateDoc(doc(db, "carros", id), { observacao: obs });
    };
    window.cadastrarCarro = async () => {
      const n = document.getElementById("novoCarroNome").value;
      if(n) { await addDoc(collection(db, "carros"), { nome: n, status: "disponivel", usuario: "", updatedAt: new Date() }); document.getElementById("novoCarroNome").value = ""; }
    };
    window.excluirCarro = async (id, n) => { if(confirm(`Excluir ${n}?`)) await deleteDoc(doc(db, "carros", id)); };
    window.toggleHistorico = () => {
      const c = document.getElementById("conteudoHistorico");
      c.style.display = c.style.display === "block" ? "none" : "block";
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        usuarioLogado = user.email; nomeUsuarioLogado = user.displayName;
        document.getElementById("authDiv").style.display = "none";
        document.getElementById("conteudoPrivado").style.display = "block";
        document.getElementById("userInfo").innerText = "👤 " + (user.displayName || user.email);
        document.getElementById("adminDiv").style.display = emailsAdmins.includes(user.email) ? "block" : "none";
        onSnapshot(collection(db, "carros"), (snap) => renderizar(snap));
        const qH = query(collection(db, "historico"), orderBy("data", "desc"), limit(10));
        onSnapshot(qH, (snap) => {
          const tab = document.getElementById("tabelaHistorico"); tab.innerHTML = "";
          snap.forEach(d => {
            const log = d.data();
            const detalhesKM = log.acao === "devolveu"
            ? `<br><small>🛣️ Rodou: ${log.totalRodado}km (De ${log.kmSaida} até ${log.kmChegada})</small>`
            : `<br><small>🛫 Saiu com: ${log.kmSaida}km</small>`;
            tab.innerHTML += `
              <div style="text-align:left; font-size:0.75rem; border-bottom:1px solid #eee; padding:8px;">
                <b>${log.acao.toUpperCase()}</b>: ${log.carroNome} por ${log.usuarioNome || log.usuario}
                ${detalhesKM}
                <div style="font-size:0.65rem; color:#999;">${log.data?.toDate().toLocaleString('pt-BR')}</div>
              </div>`;
          });
        });
      } else {
        document.getElementById("authDiv").style.display = "block";
        document.getElementById("conteudoPrivado").style.display = "none";
      }
    });
    window.resetarAgendaCarro = async (id, nome) => {
      if (!confirm(`Deseja LIMPAR TODA a agenda do veículo ${nome}?`)) return;

      try {
        const ref = doc(db, "carros", id);
        // Definimos o objeto agendaGrade como vazio {}
        await updateDoc(ref, { agendaGrade: {} });
        
        mostrarMensagem("Agenda resetada com sucesso!");
        // Se o modal estiver aberto, fecha ou redesenha
        fecharModal();
      } catch (err) {
        mostrarMensagem("Erro ao resetar agenda", "#e74c3c");
      }
    };
  </script>
</body>
</html>
