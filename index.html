<!DOCTYPE html>
<html>
<head>
  <title>Controle de Frota</title>
  <style>
    /* Seus estilos mantidos e corrigidos */
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif;}
    body { background:#f0f2f5; color:#333; text-align:center; padding:20px;}
    h2 { color:#2c3e50; margin-bottom:30px; font-size:2rem; }
    #container { max-width:500px; margin:auto; background:white; padding:25px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    input { width:100%; padding:12px 15px; margin:10px 0; border:1px solid #ccc; border-radius:10px; font-size:1rem; transition:.3s; }
    input:focus { border-color:#3498db; outline:none; box-shadow:0 0 5px rgba(52,152,219,.5); }
    button { padding:10px 20px; margin:5px; font-size:1rem; border:none; border-radius:10px; cursor:pointer; transition:.3s; }
    button:hover { opacity:.9; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .btn-login { background:#3498db; color:white; }
    .btn-register { background:#2ecc71; color:white; }
    .btn-logout { background: #e67e22; color: white; padding: 8px 15px; font-size: 0.8rem; border-radius: 8px; }
    #userDiv { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 10px; }
    #lista { margin-top:20px; }
    .carro-card { border:1px solid #ddd; margin:10px 0; padding:20px; border-radius:15px; box-shadow:0 3px 10px rgba(0,0,0,0.08); text-align:left; transition:transform .2s; position:relative; }
    .carro-card b { font-size: 1.2rem; color: #2c3e50; display: block; margin-bottom: 10px; }
    .carro-status { font-weight:bold; padding:5px 10px; border-radius:5px; color:white; }
    .status-disponivel { background: #27ae60; }
    .status-emuso { background: #e74c3c; }
    .carro-card button { margin-top:10px; width:100%; font-weight:bold; border-radius:8px; padding:8px; }
    #mensagem { position:fixed; top:10px; left:50%; transform:translateX(-50%); background:#2ecc71; color:white; padding:10px 20px; border-radius:10px; display:none; z-index:1000;}
    .password-container { position: relative; width: 100%; }
    .password-container input { padding-right: 45px; }
    .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #7f8c8d; }
    input::-ms-reveal { display: none; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>

  <h2>Controle de Frota</h2>
  <div id="mensagem"></div>

  <div id="container">
    <div id="authDiv">
      <input type="email" id="email" placeholder="Email">
      <div class="password-container">
        <input type="password" id="senha" placeholder="Senha">
        <i class="fas fa-eye toggle-password" id="olhoIcone" onclick="toggleSenha()"></i>
      </div>
      <button class="btn-login" onclick="login()">Login</button>
      <button class="btn-register" onclick="registrar()">Registrar</button>
    </div>

    <div id="conteudoPrivado" style="display: none;">
      <div id="userDiv">
        <div id="userInfo" style="margin:0; font-size: 0.8rem; font-weight: bold;"></div>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>

      <div id="adminDiv" style="background: #ecf0f1; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; display: none;">
        <h4 style="margin-bottom: 10px; color: #2c3e50;">➕ Cadastrar Novo Veículo</h4>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="novoCarroNome" placeholder="Ex: Golf - ABC1234" style="margin:0;">
          <button class="btn-register" onclick="cadastrarCarro()" style="margin:0; white-space: nowrap;">Adicionar</button>
        </div>
      </div>

      <div id="lista"></div>

      <div id="historicoSecao" style="margin-top: 30px; border-top: 2px solid #ddd; padding-top: 10px;">
        <button onclick="toggleHistorico()" style="background: #95a5a6; color: white; width: 100%; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
          📜 Ver Histórico de Movimentações
          <span id="setaHistorico">▼</span>
        </button>
        <div id="conteudoHistorico" style="display: none;">
          <div id="tabelaHistorico" style="max-height: 250px; overflow-y: auto; padding: 5px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, addDoc, query, where, getDocs, orderBy, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADjANdIwDnh6y4kgWN6oLXeJv4Z00oT-M",
      authDomain: "frota-empresa.firebaseapp.com",
      projectId: "frota-empresa",
      storageBucket: "frota-empresa.firebasestorage.app",
      messagingSenderId: "241729095537",
      appId: "1:241729095537:web:fcfb1e2a5fe7c3fca098d0"
    };

    const emailsAdmins = ["yuri@teste.com"];
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let usuarioLogado = null;
    let nomeUsuarioLogado = null;

    const mostrarMensagem = (texto, cor="#2ecc71", tempo = 2500) => {
      const msg = document.getElementById("mensagem");
      msg.style.background = cor; msg.innerText = texto; msg.style.display = "block";
      setTimeout(()=> msg.style.display="none", tempo);
    };

    function renderizar(snapshot) {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";
      
      snapshot.forEach((docSnap) => {
        const carro = docSnap.data();
        const statusClass = carro.status === "disponivel" ? "status-disponivel" : "status-emuso";
        const isAdmin = usuarioLogado && emailsAdmins.includes(usuarioLogado);
        let acaoBotao = "";
        let botaoExcluir = "";

        if (carro.status === "disponivel" && usuarioLogado) {
          acaoBotao = `<button style="background:#27ae60;color:white;" onclick="pegarCarro('${docSnap.id}')">Pegar</button>`;
        } else if (carro.status === "em_uso") {
          if (carro.usuario === usuarioLogado || isAdmin) {
            const corBotao = isAdmin && carro.usuario !== usuarioLogado ? "#e67e22" : "#e74c3c";
            const textoBotao = isAdmin && carro.usuario !== usuarioLogado ? "Devolver (Admin)" : "Devolver";
            acaoBotao = `<button style="background:${corBotao};color:white;" onclick="devolverCarro('${docSnap.id}')">${textoBotao}</button>`;
          } else {
            acaoBotao = `<button disabled style="background:gray;color:white;">Em uso</button>`;
          }
        }

        if (isAdmin) {
          botaoExcluir = `<button style="background:#c0392b; color:white; margin-top:5px; font-size:0.8rem;" onclick="excluirCarro('${docSnap.id}', '${carro.nome}')">Excluir Veículo</button>`;
        }

        const podeLimparAgenda = isAdmin || (carro.agendamento && carro.agendamento.includes(nomeUsuarioLogado));
        const podeLimparObs = isAdmin;

        lista.innerHTML += `
      <div class="carro-card">
        <b>${carro.nome}</b>
        <span class="carro-status ${statusClass}">${carro.status === "disponivel" ? "Disponível" : "Em uso"}</span>
        
        <div style="margin-top: 10px; font-size: 0.85rem; color: #444; text-align: left;">
          <span>📍 Último KM: <strong>${carro.ultimoKM || "---"}</strong></span><br>
          <span>🏢 Local: <strong>${carro.localDevolucao || "---"}</strong></span><br>
          
          <span style="display:block; margin-top:5px;">
            📝 <b>Obs:</b> ${carro.observacao || "Nenhuma"} 
            ${podeLimparObs ? `<i class="fas fa-times-circle" style="color:#e74c3c; cursor:pointer; margin-left:5px;" onclick="limparObs('${docSnap.id}')" title="Limpar Obs"></i>` : ""}
          </span>

          <span style="display:block; color:#2980b9; margin-top:5px;">
            📅 <b>Agenda:</b> ${carro.agendamento || "Sem reservas"}
            ${podeLimparAgenda && carro.agendamento ? `<i class="fas fa-calendar-times" style="color:#e74c3c; cursor:pointer; margin-left:5px;" onclick="limparAgenda('${docSnap.id}')" title="Cancelar Agenda"></i>` : ""}
          </span>
        </div>
        
        `;
      });
    }

    // Histórico em tempo real
    onSnapshot(query(collection(db, "historico"), orderBy("data", "desc"), limit(20)), (snap) => {
      const tabela = document.getElementById("tabelaHistorico");
      tabela.innerHTML = "";
      snap.forEach((d) => {
        const log = d.data();
        const cor = log.acao === "pegou" ? "#27ae60" : "#e67e22";
        tabela.innerHTML += `<div style="background:#fff; border:1px solid #eee; padding:10px; margin-bottom:5px; border-radius:8px; font-size:0.8rem;">
          <b style="color:${cor}">[${log.acao.toUpperCase()}]</b> ${log.carroNome} por ${log.usuarioNome || log.usuario} 
          ${log.km ? `(KM: ${log.km})` : ""} <small style="float:right">${log.data?.toDate().toLocaleString('pt-BR')}</small>
        </div>`;
      });
    });

    // Funções Globais
    window.pegarCarro = async (id) => {
      try {
        const q = query(collection(db, "carros"), where("usuario", "==", usuarioLogado));
        const qSnap = await getDocs(q);
        if (!qSnap.empty) return mostrarMensagem("Você já tem um carro!", "#e74c3c");

        const ref = doc(db, "carros", id);
        const snap = await getDoc(ref);
        await updateDoc(ref, { 
          status: "em_uso", 
          usuario: usuarioLogado, 
          usuarioNome: nomeUsuarioLogado || usuarioLogado,
          updatedAt: new Date() 
        });
        await addDoc(collection(db, "historico"), { 
          carroId: id, carroNome: snap.data().nome, 
          usuario: usuarioLogado, usuarioNome: nomeUsuarioLogado || usuarioLogado,
          acao: "pegou", data: new Date() 
        });
        mostrarMensagem("Carro liberado!");
      } catch (err) { mostrarMensagem(err.message, "#e74c3c"); }
    };

    window.devolverCarro = async (id) => {
      const ref = doc(db, "carros", id);
      const snap = await getDoc(ref);
      const carro = snap.data();
      const kmAnterior = parseFloat(carro.ultimoKM) || 0;

      const novoKM = prompt(`KM anterior: ${kmAnterior}. Digite o KM atual:`);
      if (!novoKM || isNaN(novoKM) || parseFloat(novoKM) <= kmAnterior) {
        return mostrarMensagem("KM inválido ou menor que o anterior!", "#e74c3c", 4000);
      }

      const local = prompt("Local (GHPC, G-MOTION ou KPT):").toUpperCase();
      if (!["GHPC", "G-MOTION", "KPT"].includes(local)) return mostrarMensagem("Local inválido!", "#e74c3c");

      try {
        await updateDoc(ref, { status: "disponivel", usuario: "", usuarioNome: "", ultimoKM: novoKM, localDevolucao: local, updatedAt: new Date() });
        await addDoc(collection(db, "historico"), { 
          carroId: id, carroNome: carro.nome, usuario: usuarioLogado, 
          usuarioNome: nomeUsuarioLogado || usuarioLogado, acao: "devolveu", km: novoKM, local: local, data: new Date() 
        });
        mostrarMensagem("Devolvido com sucesso!");
      } catch (err) { mostrarMensagem(err.message, "#e74c3c"); }
    };

    window.login = async () => {
      const e = document.getElementById("email").value;
      const s = document.getElementById("senha").value;
      try { await signInWithEmailAndPassword(auth, e, s); } catch (err) { mostrarMensagem("Erro no login", "#e74c3c"); }
    };

    window.registrar = async () => {
      const nome = prompt("Qual seu nome?");
      const e = document.getElementById("email").value;
      const s = document.getElementById("senha").value;
      if (!nome) return;
      try {
        const res = await createUserWithEmailAndPassword(auth, e, s);
        await updateProfile(res.user, { displayName: nome });
        mostrarMensagem("Conta criada!");
      } catch (err) { mostrarMensagem(err.message, "#e74c3c"); }
    };

    window.logout = () => signOut(auth);
    window.toggleSenha = () => {
      const s = document.getElementById("senha");
      s.type = s.type === "password" ? "text" : "password";
    };
    window.toggleHistorico = () => {
      const c = document.getElementById("conteudoHistorico");
      c.style.display = c.style.display === "block" ? "none" : "block";
    };
    window.editarObs = async (id) => {
      const obs = prompt("Observação:");
      if (obs !== null) await updateDoc(doc(db, "carros", id), { observacao: obs });
    };
    window.agendarCarro = async (id) => {
      const ag = prompt("Agendamento (Ex: Ivan 21/03 13h):");
      if (ag !== null) await updateDoc(doc(db, "carros", id), { agendamento: ag });
    };
    window.cadastrarCarro = async () => {
      const n = document.getElementById("novoCarroNome").value;
      if (n) {
        await addDoc(collection(db, "carros"), { nome: n, status: "disponivel", usuario: "", updatedAt: new Date() });
        document.getElementById("novoCarroNome").value = "";
      }
    };
    window.excluirCarro = async (id, nome) => {
      if (confirm(`Excluir ${nome}?`)) await deleteDoc(doc(db, "carros", id));
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        usuarioLogado = user.email;
        nomeUsuarioLogado = user.displayName;
        document.getElementById("authDiv").style.display = "none";
        document.getElementById("conteudoPrivado").style.display = "block";
        document.getElementById("userInfo").innerText = "👤 " + (user.displayName || user.email);
        document.getElementById("adminDiv").style.display = emailsAdmins.includes(user.email) ? "block" : "none";
        onSnapshot(collection(db, "carros"), (snap) => renderizar(snap));
      } else {
        document.getElementById("authDiv").style.display = "block";
        document.getElementById("conteudoPrivado").style.display = "none";
      }
    });
  </script>
</body>
</html>
